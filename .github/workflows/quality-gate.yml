name: Quality Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  baseline-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Baseline quality gate (no model calls)
        run: python run_quality_gate.py --skip-rag-eval

  model-accuracy-gate:
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Full quality gate (requires local Ollama)
        env:
          OLLAMA_URL: ${{ vars.OLLAMA_URL || 'http://localhost:11434' }}
        run: python run_quality_gate.py --strict
